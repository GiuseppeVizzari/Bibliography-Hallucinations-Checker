{% extends 'base.html' %}

{% block content %}
<div class="text-center py-5">
    <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;">
        <span class="visually-hidden">Processing...</span>
    </div>
    <h4>Checking bibliography...</h4>
    <p class="text-muted" id="status">Analyzing {{ total_count }} references</p>
    <p class="text-muted small">This may take a moment while we verify each reference against multiple sources.</p>

    <div class="progress mt-3" style="height: 6px;">
        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"
             id="progress-bar" style="width: 0%"></div>
    </div>
    <p class="small text-muted mt-2" id="progress-text">0 / {{ total_count }}</p>
</div>

<script>
(function () {
    var total = {{ total_count }};
    var checked = 0;
    var interval = setInterval(function () {
        checked = Math.min(checked + 1, total);
        var pct = Math.round((checked / total) * 100);
        document.getElementById('progress-bar').style.width = pct + '%';
        document.getElementById('progress-text').textContent = checked + ' / ' + total;
        if (checked >= total) clearInterval(interval);
    }, 2000);
})();
</script>
{% endblock %}
